<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій перший сайт</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            text-align: center;
        }

        header {
            padding: 50px 20px;
        }

        h1 {
            font-size: 40px;
        }

        p {
            font-size: 18px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: white;
            color: #333;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
        }

        .btn:hover {
            background: #ddd;
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

<header>
    <h1>Мій перший сайт 🌍</h1>
    <p>Цей сайт я створив для практичної роботи з GitHub Pages</p>
    <a href="#" class="btn">Дізнатись більше</a>
</header>

<footer>
    © 2026 | Створено учнем
</footer>

</body>
</html>
